server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Proxy reverso para o backend FastAPI — rotas de API
    location ~ ^/(auth|upload-lote|status-lote|lotes|credenciais|adaptadores|health|dashboard|docs|redoc|openapi)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 20M;
        proxy_read_timeout 300s;
    }

    # Rota específica para /health sem trailing slash
    location = /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    # Rota SPA — tudo que não é API vai para o React
    location / {
        try_files $uri $uri/ /index.html;
    }
}
